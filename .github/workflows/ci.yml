# CVantage CI — skeleton (issue #7 / 0.6). Extended to the full pipeline in #95 (11.3).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-checks:
    name: lint & format (repo-wide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      # GitHub runners ship Yarn 1 preinstalled — no corepack.
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn format:check

  openapi-spec:
    name: openapi.json artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @cvantage/server build
      - run: node server/dist/scripts/export-openapi.js openapi.json
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json

  workspace:
    name: ${{ matrix.workspace }} — typecheck, test, build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [server, frontend, shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @cvantage/${{ matrix.workspace }} typecheck
      - run: yarn workspace @cvantage/${{ matrix.workspace }} test
      - run: yarn workspace @cvantage/${{ matrix.workspace }} build

  quality-gates:
    name: bundle budget + lighthouse
    runs-on: ubuntu-latest
    needs: [workspace]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: yarn }
      - run: npm i -g yarn@1.22.22 --force
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @cvantage/shared build
      - run: yarn workspace @cvantage/frontend build
      - name: bundle budget (red on regression)
        run: node scripts/check-bundle-budget.mjs
      - name: lighthouse ci (landing + login, desktop)
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ''

  sentry-sourcemaps:
    name: sentry sourcemaps (only when configured)
    runs-on: ubuntu-latest
    needs: [workspace]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: yarn }
      - run: npm i -g yarn@1.22.22 --force
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @cvantage/shared build && yarn workspace @cvantage/frontend build
      - name: upload sourcemaps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npx --yes @sentry/cli@2 sourcemaps upload --release ${{ github.sha }} frontend/dist/assets

  browser-e2e:
    name: playwright (real stack, fake LLM)
    runs-on: ubuntu-latest
    needs: [workspace]
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: yarn }
      - run: npm i -g yarn@1.22.22 --force
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @cvantage/shared build
      - run: yarn workspace @cvantage/frontend build
      - run: yarn workspace @cvantage/server build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          MONGODB_URI: mongodb://localhost:27017/cvantage-e2e
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
