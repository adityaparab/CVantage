<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CVantage — AI-powered resume analysis: scores, suggestions and interview prep against any job description."
    />
    <title>CVantage</title>
    <script>
      // pre-hydration theme (no FOUC): mirrors src/lib/theme.ts
      (function () {
        try {
          var s = localStorage.getItem('cvantage.theme');
          var t = s === 'light' || s === 'dark' ? s : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.theme = t;
        } catch (e) { document.documentElement.dataset.theme = 'light'; }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
